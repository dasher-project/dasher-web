env:
  browser: true
  es2021: true
extends:
  - google
ignorePatterns:
  - ../browser/dasher/third_party/**
parserOptions:
  ecmaVersion: 12
  sourceType: module
rules:
  require-jsdoc: off
  valid-jsdoc: off
  linebreak-style: off
  max-len: warn
  camelcase: warn
  indent: off
  brace-style: off
  quotes: warn
  comma-dangle: off
  no-tabs: off
  no-mixed-spaces-and-tabs: off
  arrow-parens: off
  padded-blocks: off
  key-spacing: off
  no-trailing-spaces: off
  semi: warn
  new-cap: off
  space-before-function-paren: off
